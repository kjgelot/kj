<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="security-screen" style="display: none;">ACCESS DENIED</div>
    <div id="history-log"></div>
    <input type="text" id="hidden-keyboard" style="position: absolute; top: -1000px; opacity: 0;">

    <div id="calculator-window" class="calculator-window fullscreen">
        
        <div id="control-bar">
            <button id="mode-btn" onclick="toggleMode()">🗗 Win</button>
            <button class="resize-btn" onclick="adjustSize('w', -30)">W-</button>
            <button class="resize-btn" onclick="adjustSize('w', 30)">W+</button>
            <button class="resize-btn" onclick="adjustSize('h', -30)">H-</button>
            <button class="resize-btn" onclick="adjustSize('h', 30)">H+</button>
            <div id="drag-handle">≡ Drag</div>
        </div>
        
        <div class="calculator">
            <div id="display-container" onclick="focusKeyboard()">
                <div id="live-result"></div>
                <input type="text" id="display" readonly placeholder="">
            </div>

            <div class="buttons">
                <button id="clear-btn" class="operator" onpointerdown="event.preventDefault()">C</button>
                <button onclick="deleteLastChar()" class="operator" onpointerdown="event.preventDefault()">⌫</button>
                <button onclick="appendToDisplay('%')" class="operator" onpointerdown="event.preventDefault()">%</button>
                <button onclick="appendToDisplay('/')" class="operator" onpointerdown="event.preventDefault()">/</button>

                <button id="btn-7" onclick="appendToDisplay('7')" onpointerdown="event.preventDefault()">7</button>
                <button id="btn-8" onclick="appendToDisplay('8')" onpointerdown="event.preventDefault()">8</button>
                <button id="btn-9" onclick="appendToDisplay('9')" onpointerdown="event.preventDefault()">9</button>
                <button onclick="appendToDisplay('*')" class="operator" onpointerdown="event.preventDefault()">*</button>

                <button id="btn-4" onclick="appendToDisplay('4')" onpointerdown="event.preventDefault()">4</button>
                <button id="btn-5" onclick="appendToDisplay('5')" onpointerdown="event.preventDefault()">5</button>
                <button id="btn-6" onclick="appendToDisplay('6')" onpointerdown="event.preventDefault()">6</button>
                <button onclick="appendToDisplay('-')" class="operator" onpointerdown="event.preventDefault()">-</button>

                <button id="btn-1" onclick="appendToDisplay('1')" onpointerdown="event.preventDefault()">1</button>
                <button id="btn-2" onclick="appendToDisplay('2')" onpointerdown="event.preventDefault()">2</button>
                <button id="btn-3" onclick="appendToDisplay('3')" onpointerdown="event.preventDefault()">3</button>
                <button id="plus-btn" class="operator" onpointerdown="event.preventDefault()">+</button>

                <button id="btn-0" onclick="appendToDisplay('0')" style="grid-column: span 2;" onpointerdown="event.preventDefault()">0</button>
                <button onclick="appendToDisplay('.')" onpointerdown="event.preventDefault()">.</button>
                <button id="equal-btn" class="equal" onpointerdown="event.preventDefault()">=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
